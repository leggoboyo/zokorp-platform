name: Sync Leads To Zoho

on:
  schedule:
    - cron: "17 14 * * 1"
  workflow_dispatch:

jobs:
  sync-leads:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Zoho lead sync endpoint
        env:
          ZOHO_SYNC_URL: ${{ secrets.ZOHO_SYNC_URL }}
          ZOHO_SYNC_SECRET: ${{ secrets.ZOHO_SYNC_SECRET }}
        run: |
          if [ -z "$ZOHO_SYNC_URL" ] || [ -z "$ZOHO_SYNC_SECRET" ]; then
            echo "Missing ZOHO_SYNC_URL or ZOHO_SYNC_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$ZOHO_SYNC_URL" \
            -H "x-zoho-sync-secret: $ZOHO_SYNC_SECRET" \
            -H "Content-Type: application/json"
