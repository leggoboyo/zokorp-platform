name: Drain Architecture Review Queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  drain-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger architecture review worker endpoint
        env:
          ARCH_REVIEW_WORKER_URL: ${{ secrets.ARCH_REVIEW_WORKER_URL }}
          ARCH_REVIEW_WORKER_SECRET: ${{ secrets.ARCH_REVIEW_WORKER_SECRET }}
        run: |
          if [ -z "$ARCH_REVIEW_WORKER_URL" ] || [ -z "$ARCH_REVIEW_WORKER_SECRET" ]; then
            echo "Missing ARCH_REVIEW_WORKER_URL or ARCH_REVIEW_WORKER_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "${ARCH_REVIEW_WORKER_URL}?limit=1" \
            -H "x-arch-review-worker-secret: $ARCH_REVIEW_WORKER_SECRET" \
            -H "Content-Type: application/json"
